<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hukuk Sözlük - Türkçe Hukuk Terimleri Sözlüğü</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F8FAFC;
            color: #0F172A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            padding: 64px 24px;
            max-width: 600px;
        }

        .icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0D7C66, #059669);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 56px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #0D7C66;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 18px;
            color: #64748B;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            padding: 20px 28px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #0D7C66;
        }

        .stat-label {
            font-size: 13px;
            color: #94A3B8;
            margin-top: 4px;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #0D7C66;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 12px 24px;
            border: 2px solid #0D7C66;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .links a:hover {
            background: #0D7C66;
            color: #FFFFFF;
        }

        .footer {
            padding: 24px;
            color: #94A3B8;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="icon">⚖️</div>
        <h1>Hukuk Sözlük</h1>
        <p class="subtitle">
            Kapsamlı Türkçe hukuk terimleri sözlüğü. Anayasa, ceza, medeni, borçlar, ticaret, idare
            ve daha birçok hukuk dalından terimler ve tanımlar.
        </p>
        <div class="stats">
            <div class="stat">
                <div class="stat-number">3.900+</div>
                <div class="stat-label">Hukuki Terim</div>
            </div>
            <div class="stat">
                <div class="stat-number">18</div>
                <div class="stat-label">Hukuk Dalı</div>
            </div>
            <div class="stat">
                <div class="stat-number">4</div>
                <div class="stat-label">Quiz Tipi</div>
            </div>
        </div>
        <div class="links">
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="mailto:yunusbayazit@outlook.com">İletişim</a>
        </div>
    </div>
    <div class="footer">
        © 2026 Hukuk Sözlük. Tüm hakları saklıdır.
    </div>
</body>

</html>
